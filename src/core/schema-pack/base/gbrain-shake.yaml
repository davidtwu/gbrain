# gbrain-shake — corpus-matched entity schema pack (SHAKE team brain)
#
# The active pack (gbrain-base-v2) is a YC startup/investor ontology whose
# link verbs and entity types (deal, founded, invested_in, …) don't match a
# transcript + PKM knowledge brain built from Slack, Outlook, agent sessions,
# and an Obsidian vault. gbrain-shake is the domain-matched successor.
#
# ── Why the FULL type set, not just the 3 entity types (R1b, data-loss guard) ──
# `extends` does NOT merge at runtime (registry.ts — T20 unshipped; the resolved
# manifest is the CHILD ALONE). So this pack must declare the COMPLETE type set
# it wants active, or base-v2's `*unknown*→note` catch-all would silently retype
# every undeclared corpus type to `note` on a unify-types pass. Against the live
# 4,282-page brain that would flatten 2,862 pages (67%): session (2,711),
# slack-channel (103), action (39), brag-book (9). So we declare:
#   - the 3 entity types:            person, project, meeting
#   - the real generated types base-v2 omits: session, action, brag-book
#     (+ slack-channel as an alias of `slack` — David's slack pages store as
#     type `slack-channel`)
#   - the still-used base-v2 types:  concept, note, email, atom, media, source,
#     analysis, writing, event, diary
#   - the system/import types the corpus carries: reference, extract_receipt,
#     vault-cleanup (declared as TYPES, not aliases — see the catch-all note below)
# and we DROP the VC/social artifacts base-v2 carried: deal, tweet, social-digest
# (0 pages, 0 relevance to Amazon PE work).
#
# ── Catch-all caveat for Step 4 (pre-activation guard) ──
# The unify-types catch-all's "declared" set (unify-types-handler.ts:~189) is
# built from page_type NAMES ONLY — aliases do NOT exempt a type from the
# `*unknown*→note` retype. So the slack-channel-as-alias decision (Q7 ruling)
# satisfies the R1b COVERAGE test (types+aliases) but does NOT protect
# slack-channel pages from a real unify-types pass. Step 4's pre-activation
# coverage guard + the activation path must treat alias-only coverage as
# insufficient (or the collector/backfill must retype slack-channel→slack)
# before any unify-types run. The reference/extract_receipt/vault-cleanup types
# are declared as their own page_types (not aliased) precisely so they ARE in
# the names-only declared set and cannot be flattened.
#
# NOT active by default: activation is Step 4 (config unchanged here).

api_version: gbrain-schema-pack-v1
name: gbrain-shake
version: 1.0.0
description: "Corpus-matched entity schema pack for a transcript + PKM brain (SHAKE team). Extends gbrain-base-v2. Declares person/project/meeting (person+project linkable) plus the real generated corpus types (session, action, brag-book; slack with a slack-channel alias) and the still-used base-v2 types; drops VC/social artifacts (deal, tweet, social-digest) and VC link verbs. Declares the discover_entities + ner_link cycle phases."
gbrain_min_version: 0.42.0
extends: gbrain-base-v2
borrow_from: []
takes_kinds:
  - fact
  - take
  - bet
  - hunch

# migration_from intentionally OMITTED: it fires the `pack_upgrade_available`
# onboard nag for brains on the matched (pack, version). We do NOT want to nudge
# the live base-v2 brain to upgrade to shake — activation is a deliberate Step 4.

page_types:
  # ── Entity types (R1) ──
  - name: person
    primitive: entity
    path_prefixes:
      - relationships/
      - people/
      - person/
    aliases:
      - people
      - contact
      - individual
    extractable: false
    expert_routing: true
    # R1.2: gazetteer LINK TARGET. person mentions in transcripts/emails/meetings
    # become `mentions` edges once Step 2 wires linkableTypesFromPack.
    linkable: true

  - name: project
    primitive: concept
    path_prefixes:
      - initiatives/
      - projects/
      - project/
    aliases:
      - initiative
      - workstream
    extractable: false
    expert_routing: false
    # R1.2: SHAKE / Rufus / Mosaic are distinctive proper nouns that survive
    # MIN_NAME_LENGTH=4 — worth the gazetteer target.
    linkable: true

  - name: meeting
    primitive: temporal
    path_prefixes:
      - meetings/
      - meeting/
    aliases: []
    extractable: false
    expert_routing: false
    # R1.2/R1.3: SOURCE page, NOT a gazetteer target (date+topic titles produce
    # garbage edges). Retains OUTBOUND `attended` edges (meeting→person via the
    # attendees: frontmatter), which is hardcoded + pack-independent — the pack
    # only needs to DECLARE `meeting` so pages aren't demoted to `note`.
    linkable: false

  # ── Real generated types base-v2 omits (R1b.1) ──
  - name: session
    primitive: temporal
    path_prefixes:
      - sessions/
      - session/
    aliases: []
    # Agent/work session transcripts — prime source material for NER + extraction.
    extractable: true
    expert_routing: false

  - name: action
    primitive: concept
    path_prefixes:
      - actions/
      - action/
    aliases: []
    extractable: false
    expert_routing: false

  - name: brag-book
    primitive: concept
    path_prefixes:
      - brag-book/
      - brag/
    aliases: []
    extractable: false
    expert_routing: false

  # ── System / import types the corpus carries (declared as TYPES, not aliases,
  #    so the names-only catch-all cannot flatten them — see header note) ──
  - name: extract_receipt
    primitive: annotation
    # Receipt page written by the extract framework after every extractor run.
    # Carries dream_generated:true + type:extract_receipt; search source-boost +
    # extract eligibility key on the type value, so flattening it to `note` would
    # break the anti-loop guard. Mirrors gbrain-base's extract_receipt.
    path_prefixes:
      - extracts/
    aliases: []
    extractable: false
    expert_routing: false

  - name: reference
    primitive: media
    path_prefixes:
      - references/
      - reference/
    aliases: []
    extractable: false
    expert_routing: false

  - name: vault-cleanup
    primitive: annotation
    # Low-count vault import/maintenance artifact. Declared (not aliased) purely
    # so the names-only catch-all can't retype it to `note`.
    path_prefixes: []
    aliases: []
    extractable: false
    expert_routing: false

  # ── Carried-forward base-v2 types the corpus still uses (R1b.4) ──
  - name: concept
    primitive: concept
    path_prefixes:
      - wiki/concepts/
      - wiki/concept/
    aliases:
      - concept-stub
      - definition
    extractable: true
    expert_routing: false

  - name: note
    primitive: concept
    path_prefixes:
      - notes/
      - note/
    aliases:
      - memo
      - anecdote
      - insight
      - principle
      - framework
    extractable: true
    expert_routing: false

  - name: email
    primitive: temporal
    path_prefixes:
      - emails/
      - email/
    aliases:
      - email-thread
    extractable: true
    expert_routing: false

  - name: slack
    primitive: temporal
    path_prefixes:
      - slack/
    # R1b.2 / Q7: slack-channel is the ACTUAL stored type of David's slack pages;
    # added here as an alias of `slack` (one temporal Slack type, less surface).
    # NOTE: alias coverage satisfies the R1b coverage TEST but the runtime
    # catch-all matches on NAMES only — see the header caveat for Step 4.
    aliases:
      - slack-message
      - slack-thread
      - slack-channel
    extractable: true
    expert_routing: false

  - name: atom
    primitive: annotation
    path_prefixes:
      - atoms/
    subtypes:
      - name: extraction
        when:
          frontmatter_field: origin
          frontmatter_value: extraction
      - name: manual
        when:
          frontmatter_field: origin
          frontmatter_value: manual
      - name: lore
        when:
          frontmatter_field: origin
          frontmatter_value: lore
    aliases:
      - atom-extraction
      - atom-manual
      - atom-lore
      - content-atom
      - lore
    extractable: false
    expert_routing: false

  - name: media
    primitive: media
    path_prefixes:
      - media/
      - videos/
      - articles/
      - essays/
      - books/
      - podcasts/
      - blog/
      - posts/
    subtypes:
      - name: video
        when:
          path_pattern: "^videos/"
      - name: article
        when:
          path_pattern: "^articles/"
      - name: essay
        when:
          path_pattern: "^essays/"
      - name: book
        when:
          path_pattern: "^books/"
      - name: podcast
        when:
          path_pattern: "^podcasts/"
      - name: blog
        when:
          path_pattern: "^(blog|posts)/"
    aliases:
      - article
      - video
      - essay
      - book
      - podcast
      - blog-post
      - youtube-video
      - podcast-episode
    extractable: true
    expert_routing: false

  - name: source
    primitive: media
    path_prefixes:
      - sources/
      - source/
    aliases:
      - sources/article
      - source/article
      - transcript
      - ref
    extractable: true
    expert_routing: false

  - name: analysis
    primitive: media
    path_prefixes:
      - wiki/analysis/
      - analysis/
    aliases:
      - pricing-analysis
      - hiring-analysis
      - market-analysis
      - competitive-analysis
      - research
      - organization-research
    extractable: true
    expert_routing: false

  - name: writing
    primitive: media
    path_prefixes:
      - writing/
    aliases:
      - draft
      - post-draft
    extractable: true
    expert_routing: false

  - name: event
    primitive: temporal
    path_prefixes:
      - life/events/
    aliases: []
    extractable: false
    expert_routing: false

  - name: diary
    primitive: temporal
    path_prefixes:
      - life/diary/
    aliases: []
    extractable: false
    expert_routing: false

# Link verbs — only the ones David's graph actually uses (R1b.6). The VC verbs
# (founded, invested_in, led_round, yc_partner, advises) are DROPPED: no-merge
# means we hand-author the verb list, and these are dead for Amazon PE work.
link_types:
  - name: relates_to
    inverse: relates_to
  - name: mentions
  - name: discusses
  - name: works_at
    inverse: employs
  - name: attended
    inverse: attended_by

# Phase participation (R1.4). These phases don't exist yet — the declaration is
# inert until Step 5 (ner_link) / Step 8 (discover_entities) land. Ordered
# discover→ner per §3.2 (discovery fills the review queue; NER links accepted
# entities the NEXT cycle).
phases:
  - discover_entities
  - ner_link

mapping_rules:
  # R1b.5: keep the `*unknown*→note` catch-all as a safety net for genuinely
  # novel FUTURE types. With the real corpus types now declared above it stops
  # firing on the existing 4,282 pages. Must appear LAST (it's the only rule).
  - kind: retype
    from_type: "*unknown*"
    to_type: note
    subtype_field: legacy_type
    subtype: "*original_type*"
